name: ai4mars
taxonomy: core
root: ${paths.root}/data/ai4mars
use_rover_mask_as_label: false
num_classes: 3
ignore_index: 255

train:
  name: train
  split_file: ${paths.root}/data/ai4mars/splits/train.txt
  images_dir: ${paths.root}/data/ai4mars/images
  masks_dir: ${paths.root}/data/ai4mars/masks

val:
  name: val
  split_file: ${paths.root}/data/ai4mars/splits/val.txt
  images_dir: ${paths.root}/data/ai4mars/images
  masks_dir: ${paths.root}/data/ai4mars/masks

test:
  name: test
  split_file: ${paths.root}/data/ai4mars/splits/test.txt
  images_dir: ${paths.root}/data/ai4mars/images
  masks_dir: ${paths.root}/data/ai4mars/masks

loader:
  batch_size: 8
  num_workers: auto

image_size: [512, 512]

normalize:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

augmentations:
  enabled: true
  rotation: 15
  hflip: 0.5
  vflip: 0.0
  brightness: 0.2
  contrast: 0.2
  noise: 0.02
  blur: 0.1
