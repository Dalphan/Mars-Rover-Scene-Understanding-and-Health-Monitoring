name: mars_bench
taxonomy: core
hf_dataset: Mirali33/mb-mars_seg_msl
hf_config: null
image_key: image
mask_key: mask

splits:
  train: train
  val: validation
  test: test

num_classes: 3
ignore_index: 255

loader:
  batch_size: 8
  num_workers: auto

image_size: [512, 512]

normalize:
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

augmentations:
  enabled: true
  rotation: 15
  hflip: 0.5
  vflip: 0.0
  brightness: 0.2
  contrast: 0.2
  noise: 0.02
  blur: 0.1
